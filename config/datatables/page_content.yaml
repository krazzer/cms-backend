buttons:
    -   label: Add section
        action: add
        icon: 'mdi-plus'
    -   label: Delete
        action: delete
        icon: 'mdi-delete'
headers:
    id: Id
    type: Type
mobile_columns:
    - type
form:
    field_provider: section_type_fields
    field_provider_add: true
    fields:
        type:
            type: select
            label: Type
            item_provider: 'section_type_options'
            is_form_modifier: true
            validator:
                name: presence
                parameters:
                required: true
rearrange: true
source:
    type: pdo
    model: KikCMS\Entity\PageSection\PageSection