headers_translate:
    id: general.id
    email: general.email
    role: general.role
    blocked: general.blocked
mobile_columns:
    - id
    - email
buttons:
    -   label: Add user
        action: add
    -   label: Delete
        action: delete
form:
    fields:
        email:
            type: text
            label: E-mail address
            validator:
                name: email
                parameters:
                    required: true
        role:
            type: select
            item_provider: user_roles
            label: Role
        blocked:
            type: checkbox
            label: Blocked
source:
    model: KikCMS\Entity\User\User