class: pages
searchColumns: ['name.*']
headersTranslate:
    name.*: general.name
    template: general.template
    slug.*: general.slug
    active.*: general.active
    id: general.id
cells:
    name.*:
        type: 'page'
    active.*:
        type: 'checkbox'
mobileColumns:
    - name.*
buttons:
    -   label: Add page
        action: add
        icon: 'mdi-plus'
    -   label: Delete
        action: delete
        icon: 'mdi-delete'
    -   label: 'Add new…'
        icon: 'mdi-menu'
        type: 'menu'
        items:
            -   title: 'Add link'
                icon: 'mdi-link-variant'
                action: 'add'
                addType: 'link'
            -   title: 'Add menu'
                icon: 'mdi-menu'
                action: 'add'
                addType: 'menu'
form: page
source:
    model: KikCMS\Entity\Page\Page